<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ACB Simulator Pro V6</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
<div class="logo">ACB Simulator Pro V6</div>
<nav>
<button data-page="dashboard">Dashboard</button>
<button data-page="wiring">Wiring</button>
<button data-page="breaker">Breaker</button>
<button data-page="lsig">LSIG</button>
<button data-page="faults">Faults</button>
<button data-page="meter">Meter</button>
<button data-page="quiz">Quiz</button>
<button data-page="settings">Settings</button>
</nav>
</header>

<main>
<section id="dashboard" class="page active">
<h2>Dashboard</h2>
<div class="grid">
<div class="card">
<h3>Breaker</h3>
<p id="breakerState">OPEN</p>
<button id="chargeBtn">Charge</button>
<button id="closeBtn">Close</button>
<button id="openBtn">Open</button>
<button id="tripBtn">Trip</button>
</div>

<div class="card">
<h3>Spring</h3>
<p id="springState">Discharged</p>
</div>

<div class="card">
<h3>Current</h3>
<h1 id="currentValue">0 A</h1>
</div>

<div class="card">
<h3>Voltage</h3>
<h1 id="voltageValue">415 V</h1>
</div>
</div>
</section>

<section id="wiring" class="page">
<h2>Interactive Wiring</h2>
<div id="svgContainer"></div>
</section>

<section id="breaker" class="page">
<h2>Breaker Animation</h2>
<canvas id="breakerCanvas"></canvas>
</section>

<section id="lsig" class="page">
<h2>LSIG Settings</h2>
<label>Long <input type="range"></label><br>
<label>Short <input type="range"></label><br>
<label>Instantaneous <input type="range"></label><br>
<label>Ground <input type="range"></label>
</section>

<section id="faults" class="page">
<h2>Fault Simulation</h2>
<button>Overload</button>
<button>Short Circuit</button>
<button>Ground Fault</button>
<button>Undervoltage</button>
</section>

<section id="meter" class="page">
<h2>Digital Multimeter</h2>
<div id="meterDisplay">0.0</div>
</section>

<section id="quiz" class="page">
<h2>Quiz</h2>
<div id="quizArea"></div>
</section>

<section id="settings" class="page">
<h2>Settings</h2>
<label><input type="checkbox" id="darkMode"> Dark Mode</label><br><br>
<label><input type="checkbox" id="voiceMode"> Voice</label>
</section>
</main>

<script src="app.js"></script>
<script src="wiring.js"></script>
<script src="breaker.js"></script>
<script src="lsig.js"></script>
<script src="fault.js"></script>
<script src="multimeter.js"></script>
<script src="voice.js"></script>
<script src="quiz.js"></script>
<script src="ai.js"></script>
<script src="report.js"></script>
<script src="export.js"></script>

</body>
</html>
